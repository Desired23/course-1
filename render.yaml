databases:
  - name: course-db
    plan: free
    databaseName: course_db
    user: course_user

services:
  # ── Backend (Django API) ──
  - type: web
    name: course-api
    runtime: python
    plan: free
    rootDir: course
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: course-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: MOMO_REDIRECT_URL
        sync: false
      - key: MOMO_IPN_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # ── Frontend (React/Vite Static Site) ──
  - type: web
    name: course-fe
    runtime: static
    plan: free
    rootDir: course_fe
    buildCommand: npm install && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
