<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xác minh email</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; }
.container { max-width: 600px; margin: auto; background: #fff; border-radius: 10px; overflow: hidden; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.header { background: #007BFF; color: #fff; padding: 20px; }
.content { padding: 20px; }
.button { display: inline-block; background: #28a745; color: #fff; padding: 12px 20px; border-radius: 5px; text-decoration: none; margin-top: 15px; }
.button:hover { background: #218838; }
.footer { font-size: 12px; color: #777; padding: 15px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>Xác minh email của bạn</h2>
  </div>
  <div class="content">
    <p>Xin chào <strong>{{ user.full_name }}</strong>,</p>
    <p>Bấm vào nút bên dưới để xác nhận email và kích hoạt tài khoản.</p>
    <a href="{{ verification_url }}" class="button">Xác nhận email</a>
  </div>
  <div class="footer">
    Email này sẽ hết hạn sau 24h.
  </div>
</div>
</body>
</html>
